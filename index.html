<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MRC SST" />
    <!-- Android: tema oscuro (default) — colorea barra superior Y barra inferior de navegación -->
    <meta name="theme-color" content="#1B2A4A" media="(prefers-color-scheme: dark)" />
    <!-- Android: tema claro — usa el gris claro de la app en modo light -->
    <meta name="theme-color" content="#F0F3F9" media="(prefers-color-scheme: light)" />
    <!-- Fallback sin media query para navegadores que no soportan media en theme-color -->
    <meta name="theme-color" content="#1B2A4A" />
    <!-- Fuerza lectura del esquema de colores correcto por el sistema Android -->
    <meta name="color-scheme" content="dark light" />

    <meta name="description" content="Herramientas SST/SSO - Agrosuper Comercial. Misión Riesgo Cero." />

    <link rel="icon" type="image/png" href="/MRC.app/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/MRC.app/icons/apple-touch-icon.png" />

    <title>Misión Riesgo Cero · Agrosuper SST</title>

    <!-- GitHub Pages SPA: restaura la ruta después del redirect de 404.html -->
    <script>
      (function () {
        var qs = window.location.search;
        if (qs.indexOf('?r=') === 0 || qs.indexOf('&r=') > -1) {
          var params = {};
          qs.slice(1).split('&').forEach(function (p) {
            var kv = p.split('=');
            params[kv[0]] = decodeURIComponent(kv[1] || '');
          });
          var path = params['r'] || '/';
          var query = params['q'] ? '?' + params['q'] : '';
          window.history.replaceState(
            null, null,
            '/MRC.app' + path + query + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
