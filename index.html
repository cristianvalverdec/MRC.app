    <!--
      Script bloqueante: se ejecuta ANTES de que Chrome Android pinte el primer frame.
      Fuerza fondo navy en html+body para que la barra inferior adopte ese color.
      También lee el tema guardado del usuario para aplicar la variante correcta.
    -->
    <script>
      (function() {
        var NAVY = '#1B2A4A';
        var d = document.documentElement;
        try {
          var s = JSON.parse(localStorage.getItem('mrc-user-store') || '{}');
          var t = (s.state && s.state.theme) || 'dark';
          if (t === 'light') {
            var c = '#F0F3F9';
            d.setAttribute('data-theme', 'light');
            d.style.backgroundColor = c;
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', c);
          } else {
            d.style.backgroundColor = NAVY;
          }
        } catch(e) {
          d.style.backgroundColor = NAVY;
        }
      })();
    </script>

    <!-- GitHub Pages SPA: restaura la ruta después del redirect de 404.html -->
    <script>
      (function () {
        var qs = window.location.search;
        if (qs.indexOf('?r=') === 0 || qs.indexOf('&r=') > -1) {
          var params = {};
          qs.slice(1).split('&').forEach(function (p) {
            var kv = p.split('=');
            params[kv[0]] = decodeURIComponent(kv[1] || '');
          });
          var path = params['r'] || '/';
          var query = params['q'] ? '?' + params['q'] : '';
          window.history.replaceState(
            null, null,
            '/MRC.app' + path + query + window.location.hash
          );
        }
      })();
    </script>
